<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Space Invaders - Giochino retrò stile anni 80" />
  <title>Space Invaders</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=cabinet-grotesk@500,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/tokens.css" />
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <style>
    body {
      background: #0a0a0a;
    }

    .game-container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 1rem;
    }

    .game-header {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00;
      font-family: 'Courier New', monospace;
    }

    .game-header h1 {
      font-size: 2rem;
      margin: 0;
      letter-spacing: 2px;
      font-weight: 700;
    }

    .game-stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      font-family: 'Courier New', monospace;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00;
      font-size: 0.9rem;
    }

    #gameCanvas {
      display: block;
      background: #000;
      border: 3px solid #00ff00;
      box-shadow: 0 0 20px #00ff00;
      margin: 0 auto 1.5rem;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .game-controls {
      background: rgba(0, 255, 0, 0.05);
      border: 2px solid #00ff00;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-top: 1rem;
      font-family: 'Courier New', monospace;
      color: #00ff00;
      text-shadow: 0 0 10px #00ff00;
    }

    .game-controls h3 {
      margin-top: 0;
      color: #00ff00;
    }

    .controls-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 0.85rem;
    }

    .controls-list li {
      padding: 0.25rem;
    }

    .button-row {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
      justify-content: center;
    }

    .btn-game {
      padding: 0.75rem 1.5rem;
      background: #00ff00;
      color: #000;
      border: 2px solid #00ff00;
      border-radius: 0.5rem;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      text-shadow: 0 0 5px #00ff00;
    }

    .btn-game:hover {
      box-shadow: 0 0 20px #00ff00;
      transform: scale(1.05);
    }

    .btn-game:active {
      transform: scale(0.95);
    }

    .game-over {
      text-align: center;
      font-family: 'Courier New', monospace;
      color: #ff0000;
      text-shadow: 0 0 10px #ff0000;
      font-size: 1.2rem;
      margin-top: 1rem;
    }

    .back-link {
      display: inline-block;
      margin-top: 1rem;
      color: #00ff00;
      text-decoration: none;
      font-family: 'Courier New', monospace;
      border: 2px solid #00ff00;
      padding: 0.5rem 1rem;
      border-radius: 0.25rem;
      transition: all 0.2s;
    }

    .back-link:hover {
      background: #00ff00;
      color: #000;
      box-shadow: 0 0 10px #00ff00;
    }

    @media (max-width: 600px) {
      .game-header h1 {
        font-size: 1.5rem;
      }

      #gameCanvas {
        max-width: 100%;
        height: auto;
      }

      .controls-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="site-header" data-header>
    <div class="container navbar">
      <a class="brand" href="../index.html" aria-label="Home">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 16.5 12 5l7 11.5"/>
            <path d="M8.5 16.5h7"/>
            <path d="M10.5 12.5h3"/>
          </svg>
        </span>
        <span class="brand__text">Space Invaders</span>
      </a>

      <a href="./projects.html" class="btn btn--secondary" style="margin-left: auto;">← Progetti</a>
    </div>
  </header>

  <main id="main-content">
    <section class="game-container">
      <div class="game-header">
        <h1>⚡ SPACE INVADERS ⚡</h1>
      </div>

      <div class="game-stats">
        <div>SCORE: <span id="score">0</span></div>
        <div>VITE: <span id="lives">3</span></div>
        <div>LIVELLO: <span id="level">1</span></div>
      </div>

      <canvas id="gameCanvas" width="800" height="600"></canvas>

      <div id="gameOverMessage" class="game-over" style="display: none;"></div>

      <div class="button-row">
        <button class="btn-game" onclick="startGame()">NUOVA PARTITA</button>
        <button class="btn-game" onclick="togglePause()">PAUSA</button>
      </div>

      <div class="game-controls">
        <h3>🎮 COMANDI:</h3>
        <ul class="controls-list">
          <li>← → : Muovi astronave</li>
          <li>SPAZIO: Spara</li>
          <li>P: Pausa</li>
          <li>WASD: Movimento alternativo</li>
        </ul>
      </div>

      <div style="text-align: center; margin-top: 2rem;">
        <a href="./projects.html" class="back-link">← TORNA AI PROGETTI</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer__inner">
      <span>Space Invaders Retrò</span>
      <span>Anni 80 · Stile Verde Fluo · Divertimento Garantito</span>
    </div>
  </footer>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game variables
    let gameRunning = false;
    let gamePaused = false;
    let score = 0;
    let level = 1;
    let lives = 3;

    // Player
    const player = {
      x: canvas.width / 2 - 20,
      y: canvas.height - 40,
      width: 40,
      height: 30,
      speed: 5,
      dx: 0
    };

    // Bullets
    let bullets = [];
    const bulletSpeed = 7;

    // Enemies
    let enemies = [];
    let enemyBullets = [];
    let enemySpeed = 2;

    // Controls
    const keys = {};

    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;

      if (e.key === ' ') {
        e.preventDefault();
        shoot();
      }
      if (e.key.toLowerCase() === 'p') {
        togglePause();
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    function shoot() {
      if (gameRunning && !gamePaused) {
        bullets.push({
          x: player.x + player.width / 2 - 2,
          y: player.y,
          width: 4,
          height: 15
        });
      }
    }

    function createEnemies() {
      enemies = [];
      const rows = 3;
      const cols = 6;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          enemies.push({
            x: 60 + c * 100,
            y: 40 + r * 70,
            width: 30,
            height: 25,
            dx: enemySpeed
          });
        }
      }
    }

    function drawPlayer() {
      ctx.fillStyle = '#00ff00';
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#00ff00';

      // Astronave triangolo
      ctx.beginPath();
      ctx.moveTo(player.x + player.width / 2, player.y);
      ctx.lineTo(player.x + player.width, player.y + player.height);
      ctx.lineTo(player.x, player.y + player.height);
      ctx.closePath();
      ctx.fill();

      ctx.shadowBlur = 0;
    }

    function drawEnemies() {
      ctx.fillStyle = '#00ff00';
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#00ff00';

      enemies.forEach(enemy => {
        // Nemici - stile arcade semplice
        ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
        ctx.strokeStyle = '#00ff00';
        ctx.lineWidth = 1;
        ctx.strokeRect(enemy.x + 5, enemy.y + 5, enemy.width - 10, enemy.height - 10);
      });

      ctx.shadowBlur = 0;
    }

    function drawBullets() {
      ctx.fillStyle = '#00ff00';
      ctx.shadowBlur = 5;
      ctx.shadowColor = '#00ff00';

      bullets.forEach(bullet => {
        ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
      });

      ctx.shadowBlur = 0;
    }

    function drawEnemyBullets() {
      ctx.fillStyle = '#ff0000';
      ctx.shadowBlur = 5;
      ctx.shadowColor = '#ff0000';

      enemyBullets.forEach(bullet => {
        ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
      });

      ctx.shadowBlur = 0;
    }

    function updatePlayer() {
      player.dx = 0;

      if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.dx = -player.speed;
      if (keys['ArrowRight'] || keys['d'] || keys['D']) player.dx = player.speed;
      if (keys['w'] || keys['W']) {} // Up non serve
      if (keys['s'] || keys['S']) {} // Down non serve

      player.x += player.dx;

      // Collision con bordi
      if (player.x < 0) player.x = 0;
      if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
    }

    function updateBullets() {
      bullets = bullets.filter(b => b.y > 0);
      bullets.forEach(bullet => {
        bullet.y -= bulletSpeed;
      });
    }

    function updateEnemies() {
      let changeDirection = false;

      enemies.forEach(enemy => {
        enemy.x += enemy.dx;
        if (enemy.x < 0 || enemy.x + enemy.width > canvas.width) {
          changeDirection = true;
        }
      });

      if (changeDirection) {
        enemySpeed *= -1;
        enemies.forEach(enemy => {
          enemy.dx = enemySpeed;
          enemy.y += 30;
        });
      }

      // Enemy shoot
      if (Math.random() < 0.02 && enemies.length > 0) {
        const randomEnemy = enemies[Math.floor(Math.random() * enemies.length)];
        enemyBullets.push({
          x: randomEnemy.x + randomEnemy.width / 2 - 2,
          y: randomEnemy.y + randomEnemy.height,
          width: 4,
          height: 12,
          dy: 4
        });
      }
    }

    function updateEnemyBullets() {
      enemyBullets = enemyBullets.filter(b => b.y < canvas.height);
      enemyBullets.forEach(bullet => {
        bullet.y += bullet.dy;
      });
    }

    function checkCollisions() {
      // Player bullets vs enemies
      for (let i = bullets.length - 1; i >= 0; i--) {
        for (let j = enemies.length - 1; j >= 0; j--) {
          if (bullets[i] && enemies[j] &&
              bullets[i].x < enemies[j].x + enemies[j].width &&
              bullets[i].x + bullets[i].width > enemies[j].x &&
              bullets[i].y < enemies[j].y + enemies[j].height &&
              bullets[i].y + bullets[i].height > enemies[j].y) {
            score += 10;
            bullets.splice(i, 1);
            enemies.splice(j, 1);
            break;
          }
        }
      }

      // Enemy bullets vs player
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        if (enemyBullets[i].x < player.x + player.width &&
            enemyBullets[i].x + enemyBullets[i].width > player.x &&
            enemyBullets[i].y < player.y + player.height &&
            enemyBullets[i].y + enemyBullets[i].height > player.y) {
          lives--;
          enemyBullets.splice(i, 1);
          break;
        }
      }

      // Enemies reaching bottom
      enemies.forEach(enemy => {
        if (enemy.y > canvas.height) {
          lives = 0;
        }
      });
    }

    function updateUI() {
      document.getElementById('score').textContent = score;
      document.getElementById('lives').textContent = lives;
      document.getElementById('level').textContent = level;
    }

    function gameLoop() {
      // Clear canvas con effetto scanline
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (gameRunning && !gamePaused) {
        updatePlayer();
        updateBullets();
        updateEnemies();
        updateEnemyBullets();
        checkCollisions();

        if (enemies.length === 0) {
          level++;
          enemySpeed += 1;
          createEnemies();
          score += 100;
        }

        if (lives <= 0) {
          gameRunning = false;
          document.getElementById('gameOverMessage').textContent = `GAME OVER! SCORE: ${score}`;
          document.getElementById('gameOverMessage').style.display = 'block';
        }
      }

      drawEnemies();
      drawBullets();
      drawEnemyBullets();
      drawPlayer();

      updateUI();

      if (gamePaused) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff00';
        ctx.font = 'bold 40px Courier New';
        ctx.textAlign = 'center';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#00ff00';
        ctx.fillText('PAUSA', canvas.width / 2, canvas.height / 2);
      }

      requestAnimationFrame(gameLoop);
    }

    function startGame() {
      gameRunning = true;
      gamePaused = false;
      score = 0;
      level = 1;
      lives = 3;
      bullets = [];
      enemyBullets = [];
      enemySpeed = 2;
      document.getElementById('gameOverMessage').style.display = 'none';
      createEnemies();
    }

    function togglePause() {
      if (gameRunning) {
        gamePaused = !gamePaused;
      }
    }

    // Start the game
    gameLoop();
    startGame();
  </script>
</body>
</html>
