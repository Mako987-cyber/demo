<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wttr.in raw viewer</title>
  <link rel="stylesheet" href="./style-3.css">
</head>
<body>
  <main class="weather-container">
    <h1>wttr.in raw viewer</h1>
    <p class="intro-text">Inserisci una città e visualizza l'output puro restituito da wttr.in.</p>

    <section class="search-section" aria-label="Ricerca città">
      <div class="search-wrapper">
        <input
          id="cityInput"
          class="search-input"
          type="text"
          placeholder="Es. Milan"
          autocomplete="off"
        >
        <button id="searchBtn" class="search-button" type="button">Esegui curl</button>
      </div>
    </section>

    <div id="loadingMessage" class="loading" hidden>Richiesta in corso...</div>
    <div id="errorMessage" class="error" hidden></div>

    <section class="weather-result">
      <h2>Output raw</h2>
      <pre id="weatherResult" class="raw-output">Nessun risultato ancora.</pre>
    </section>
  </main>

  <script src="./script-2.js" defer></script>
</body>
</html>
